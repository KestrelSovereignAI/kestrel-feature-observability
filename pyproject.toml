[project]
name = "kestrel-feature-observability"
version = "0.2.0"
description = "Kestrel observability, wellness, metrics"
requires-python = ">=3.11"
dependencies = [
    "kestrel-sovereign-sdk>=0.4,<1",
    "kestrel-sovereign>=0.7,<1",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=1.1.0",
]

[project.entry-points."kestrel_sovereign.features"]
ObservabilityFeature = "kestrel_feature_observability:ObservabilityFeature"
WellnessFeature = "kestrel_feature_observability.wellness.feature:WellnessFeature"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["kestrel_feature_observability"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
