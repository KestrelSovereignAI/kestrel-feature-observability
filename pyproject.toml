[project]
name = "kestrel-feature-observability"
version = "0.1.0"
description = "Kestrel observability, wellness, metrics"
requires-python = ">=3.11"
dependencies = [
    "kestrel-sovereign-sdk @ git+https://github.com/KestrelSovereignAI/kestrel-sovereign-sdk.git",
    "kestrel-sovereign @ git+https://github.com/KestrelSovereignAI/kestrel-sovereign.git",
]

[project.entry-points."kestrel_sovereign.features"]
ObservabilityFeature = "kestrel_feature_observability:ObservabilityFeature"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["kestrel_feature_observability"]
